# mise 全局工具版本管理
# ============================================================
#
# mise 是一个开发工具版本管理器 (管理语言运行时、CLI 工具等的版本,类似 asdf 但更快)
# 官方文档: https://mise.jdx.dev/
#
# 常用命令:
#   mise use -g <tool>@<version>   # 设置全局版本 (修改此文件)
#   mise use <tool>@<version>      # 设置项目版本 (生成 .mise.toml)
#   mise install                   # 安装声明的所有版本
#   mise ls                        # 查看已安装的工具
#   mise ls-remote <tool>          # 查看可安装的远程版本
#   mise prune                     # 清理未使用的版本
#   mise doctor                    # 诊断配置问题
#
# ============================================================
# 多版本 LSP (Language Server Protocol) 与工具链管理思想
# ============================================================
#
# 传统的全局安装 (如 `npm i -g`, `go install`, `pip install`) 容易导致：
# 1. 污染系统或基础环境。
# 2. 版本冲突（项目 A 需要旧版 LSP，项目 B 需要新版）。
# 3. 跨机器迁移困难（忘记装了哪些全局包）。
#
# 💡 mise 优雅的多版本隔离方案：
#
# 1. 全局防灾保底：本文件 (`~/.config/mise/config.toml`) 中定义的工具属于 "全局后备"。
#    当你在一个没有任何配置的普通目录下打开编辑器（如 Helix）时，会默认使用这些版本，确保开箱即用。
#
# 2. 真正的项目级隔离：如果某个工程需要特定版本的运行时或 LSP，无需手写配置文件，
#    只需在项目根目录执行：
#      mise use node@16
#      mise use npm:@vtsls/language-server@latest  # 推荐使用 latest，除非项目源码强依赖特定老版本
#    mise 会自动生成/更新 `.mise.toml` 文件。
#    当你 `cd` 进入该目录，mise 会瞬间、无感地接管 PATH。此时 Helix 唤起的 LSP 也是该项目独享的隔离版本，
#    完全不影响全局和其他项目的开发环境。
#
# 3. 生态大一统：不需要记 `npm`, `cargo`, `go`, `pipx` 各种安装命令，
#    全部收敛到 `mise install` 中统一管理。
#
# ============================================================

[env]
# 抑制 npm 全局安装时的 deprecation 等冗长警告输出
NPM_CONFIG_LOGLEVEL = "error"

[tools]
# --- 基础语言运行时 ---
go = "latest"
node = "lts"
bun = "latest"
python = "latest"
rust = "latest"

# === 语言服务器与配套工具链 (用于支持 Helix/Neovim) ===
# 运行 `mise install` 即可自动并隔离地下载以下所有依赖

# --- Go 生态 ---
"go:golang.org/x/tools/gopls" = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:github.com/go-delve/delve/cmd/dlv" = "latest"
"go:github.com/nametake/golangci-lint-langserver" = "latest"
"go:github.com/golangci/golangci-lint/cmd/golangci-lint" = "latest"

# --- Python 生态 ---
# ruff: 默认 aqua backend 无法正确解析 @latest，改用 github backend 直接获取官方 Release，
# 避免 `mise install` 还需要额外预装 pipx 这类前置命令。
"github:astral-sh/ruff" = "latest" # Linter/Formatter/LSP
"npm:pyright" = "latest" # Type Checker LSP

# --- Web 生态 (TS/JS/CSS/HTML/JSON) ---
"npm:@vtsls/language-server" = "latest"
"npm:vscode-langservers-extracted" = "latest"
"npm:yaml-language-server" = "latest"
"npm:@tailwindcss/language-server" = "latest"
"npm:@vue/language-server" = "latest"
"npm:@vue/typescript-plugin" = "latest"

# --- Rust 生态 ---
# taplo: 仅有 aqua/cargo 两个 backend；aqua 无法正确解析 @latest，cargo 为官方推荐，首次编译后有缓存
"cargo:taplo-cli" = "latest" # TOML Formatter/LSP
# 注意: 不通过 mise 管理 rust-analyzer 的原因
# 1. 它是 Rust 官方工具链的一部分，强依赖底层的 rustc 和特定平台的系统级 API。
# 2. 从源码通过 cargo 编译安装极其耗时，且容易因为 C 依赖报错。
# 3. macOS 下最标准且稳定的做法是通过 `rustup component add rust-analyzer` 或 `brew install rust-analyzer` 获取预编译库。

# --- C / C++ 生态 ---
# 注意: 不通过 mise 管理 clangd 的原因
# 1. clangd 是 LLVM 项目的一部分，属于极其庞大的底层 C++ 编译器前端引擎。
# 2. 任何语言维度的包管理器 (npm/pip/cargo) 都无法高效、直接地分发这个十几 GB 源码的巨兽。
# 3. 必须通过 macOS 的系统级包管理器获取 Apple 专属的预编译二进制包：`brew install llvm`。

# --- Shell / 基础设施 / 数据库 ---
shfmt = "latest" # Shell Formatter
"npm:bash-language-server" = "latest"
"npm:fish-lsp" = "latest"
"npm:@microsoft/compose-language-service" = "latest"
"npm:dockerfile-language-server-nodejs" = "latest"
"npm:sql-language-server" = "latest"

# === CLI 增强工具 ===
# 以下工具均为纯二进制 CLI，通过 mise 的 aqua backend 从 GitHub Release 直接下载，
# 安装速度远快于 brew，且支持精确的版本锁定。
lazygit = "latest"    # 终端 Git 交互式管理器
gh = "latest"         # GitHub 官方 CLI
bat = "latest"        # 带语法高亮的 cat 替代品
# asciinema: mise 默认注册表里没有该工具，这里显式使用 aqua 源以供 `rec` 录制/回放终端会话
"aqua:asciinema/asciinema" = "latest"
eza = "latest"        # 现代化 ls 替代品
ripgrep = "latest"    # 极速正则搜索工具 (替代 grep)
glow = "latest"       # 终端 Markdown 阅读器
shellcheck = "latest" # Shell 脚本静态分析工具
# fd: 现代化 find 替代品。由于 GitHub Release 长期缺失 macOS x86 二进制包 (aqua backend 报错)，此处改用 cargo 后端
"cargo:fd-find" = "latest"

# --- AI 工具链 ---
"npm:opencode-ai" = "latest"
