# Helix 语言服务器 (LSP) 配置文件
# ============================================================
#
# 配置文件位置:
#   Linux/Mac: ~/.config/helix/languages.toml
#   Windows: %AppData%\helix\languages.toml
#
# ============================================================
# LSP 安装流程
# ============================================================
#
# 1. 检查当前 LSP 支持状态:
#      hx --health         # 查看所有语言
#      hx --health go      # 查看特定语言
#
# 2. 安装所需的 LSP 服务器与格式化工具:
#
#    本仓库的约定是:
#    - 优先通过 `mise` 统一安装可跨项目复用的运行时、LSP 与格式化工具
#    - 仅对和 macOS 深度绑定或通过 Homebrew 更稳定的工具使用 `brew`
#    - 不建议使用 `npm i -g`、`pip install`、`go install` 这类会污染全局环境的方式
#
#    # ---- 首次安装 / 同步全局工具链（推荐）----
#    mise install
#
#    # ---- 按需增补单个工具（示例）----
#    mise use -g go@latest
#    mise use -g npm:@vtsls/language-server@latest
#    mise use -g npm:vscode-langservers-extracted@latest
#    mise use -g npm:yaml-language-server@latest
#    mise use -g npm:@tailwindcss/language-server@latest
#    mise use -g npm:bash-language-server@latest
#    mise use -g npm:dockerfile-language-server-nodejs@latest
#    mise use -g npm:sql-language-server@latest
#    mise use -g pipx:ruff@latest
#    mise use -g npm:pyright@latest
#    mise use -g cargo:taplo-cli@latest
#
#    # ---- 仍建议用 Homebrew 的工具（平台相关 / 更稳定）----
#    brew install llvm            # clangd / clang-format
#    brew install rust-analyzer   # Rust LSP
#    brew install shfmt           # Shell formatter
#    brew install golangci-lint   # Go lint engine
#    brew install buf             # Protobuf 工具链
#
#    # ---- 说明 ----
#    # `gopls`、`goimports`、`golangci-lint-langserver` 等如果已写入 mise 配置，
#    # 直接执行 `mise install` 即可，无需单独全局安装。
#
# 3. 安装后重新检查:
#      hx --health <语言名>
#    确认 LSP 列显示 ✓ 即可
#
# 4. 修改本文件后在 Helix 中执行:
#      :config-reload
#    或重启 LSP:
#      :lsp-restart
#
# ============================================================
# 常用 LSP 快捷键
# ============================================================
#
# gd        - 跳转到定义 (Go to Definition)
# gy        - 跳转到类型定义 (Go to Type definition)
# gr        - 查看引用 (Go to References)
# gi        - 跳转到实现 (Go to Implementation)
# <space> k - 显示悬浮文档 (Hover)
# <space> a - 代码操作 (Code Action)
# <space> r - 重命名符号 (Rename)
# <space> s - 文档符号列表 (Document Symbols)
# <space> S - 工作区符号列表 (Workspace Symbols)
# <space> d - 显示诊断信息 (Diagnostics)
# ]d / [d   - 跳转到下/上一个诊断
#
# ============================================================
# ============================================================

# ============================================================
# Go
# ============================================================
[[language]]
name = "go"
# 保存时自动格式化 (默认: true)
auto-format = true
# 使用 goimports 格式化 (自动整理 import)
formatter = { command = "goimports" }
language-servers = ["gopls", "golangci-lint-langserver"]

# gopls 语言服务器设置
[language-server.gopls]
command = "gopls"

[language-server.gopls.config]
# 使用 gofumpt 风格格式化 (比 gofmt 更严格)
gofumpt = true
# 启用静态分析
staticcheck = true

[language-server.gopls.config.hints]
# 内联提示 (在 config.toml 中 display-inlay-hints = true 时生效)
assignVariableTypes = true
compositeLiteralFields = true
constantValues = true
functionTypeParameters = true
parameterNames = true
rangeVariableTypes = true

# golangci-lint 语言服务器 (实时 lint 诊断)
[language-server.golangci-lint-langserver]
command = "golangci-lint-langserver"

[language-server.golangci-lint-langserver.config]
command = [
  "golangci-lint",
  "run",
  "--out-format",
  "json",
  "--issues-exit-code=1",
]

# ============================================================
# Python
# ============================================================
[[language]]
name = "python"
auto-format = true
language-servers = ["ruff", "pyright"]

[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]

# ruff 内置 LSP (取代已废弃的 ruff-lsp)
[language-server.ruff]
command = "ruff"
args = ["server"]

# ============================================================
# Rust
# ============================================================
[[language]]
name = "rust"
auto-format = true

[language-server.rust-analyzer]
command = "rust-analyzer"

[language-server.rust-analyzer.config]
check.command = "clippy"

# ============================================================
# C / C++
# ============================================================
[[language]]
name = "c"
auto-format = true
language-servers = ["clangd"]

[[language]]
name = "cpp"
auto-format = true
language-servers = ["clangd"]

[language-server.clangd]
command = "clangd"
args = ["--background-index", "--clang-tidy", "--completion-style=detailed"]

# ============================================================
# TypeScript / JavaScript / TSX / JSX
# ============================================================
[[language]]
name = "typescript"
auto-format = true
language-servers = ["vtsls", "tailwindcss-language-server"]

[[language]]
name = "javascript"
auto-format = true
language-servers = ["vtsls", "tailwindcss-language-server"]

[[language]]
name = "tsx"
auto-format = true
language-servers = ["vtsls", "tailwindcss-language-server"]

[[language]]
name = "jsx"
auto-format = true
language-servers = ["vtsls", "tailwindcss-language-server"]

[language-server.vtsls]
command = "vtsls"
args = ["--stdio"]
config = { typescript = { tsserver = { maxTsServerMemory = 4096 } } }

# ============================================================
# TOML
# ============================================================
[[language]]
name = "toml"
auto-format = true
language-servers = ["taplo"]

[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio"]

# ============================================================
# YAML
# ============================================================
[[language]]
name = "yaml"
# 目前有bug，自动格式化会超时导致退出helix卡住, 暂时关闭
auto-format = false
language-servers = ["yaml-language-server"]

[language-server.yaml-language-server]
command = "yaml-language-server"
args = ["--stdio"]

[language-server.yaml-language-server.config.yaml]
# 启用 JSON schema 验证
validate = true
# JSON Schema 自动匹配
schemas = { "https://json.schemastore.org/github-workflow.json" = ".github/workflows/*.{yml,yaml}", "https://json.schemastore.org/github-action.json" = "action.{yml,yaml}", "https://json.schemastore.org/docker-compose.json" = "docker-compose*.{yml,yaml}", "https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.28.0-standalone-strict/all.json" = "k8s/**/*.{yml,yaml}" }

# ============================================================
# JSON
# ============================================================
[[language]]
name = "json"
auto-format = true
language-servers = ["vscode-json-language-server"]

[language-server.vscode-json-language-server]
command = "vscode-json-language-server"
args = ["--stdio"]

[language-server.vscode-json-language-server.config.json]
schemas = [
  { fileMatch = [
    "package.json",
  ], url = "https://json.schemastore.org/package.json" },
  { fileMatch = [
    "tsconfig.json",
    "tsconfig.*.json",
  ], url = "https://json.schemastore.org/tsconfig.json" },
  { fileMatch = [
    ".eslintrc.json",
    ".eslintrc",
  ], url = "https://json.schemastore.org/eslintrc.json" },
  { fileMatch = [
    ".prettierrc",
    ".prettierrc.json",
  ], url = "https://json.schemastore.org/prettierrc.json" },
]

# ============================================================
# HTML / CSS
# ============================================================
[[language]]
name = "html"
auto-format = true
language-servers = [
  "vscode-html-language-server",
  "tailwindcss-language-server",
]

[[language]]
name = "css"
auto-format = true
language-servers = ["vscode-css-language-server", "tailwindcss-language-server"]

# ============================================================
# Bash / Shell
# ============================================================
[[language]]
name = "bash"
auto-format = true
language-servers = ["bash-language-server"]
formatter = { command = "shfmt", args = ["-i", "2", "-ci"] }

[language-server.bash-language-server]
command = "bash-language-server"
args = ["start"]

# ============================================================
# Markdown
# ============================================================
# 移除 marksman，因为对于纯文本编辑过于臃肿且缺乏实际必要性。
# 依靠 Helix 内置的 Tree-sitter 语法高亮即可。

# ============================================================
# Dockerfile
# ============================================================
[[language]]
name = "dockerfile"
language-servers = ["docker-langserver"]

[language-server.docker-langserver]
command = "docker-langserver"
args = ["--stdio"]

# ============================================================
# INI / Config 文件
# ============================================================
[[language]]
name = "ini"
file-types = ["ini", "cfg", "properties"]

# ============================================================
# SQL
# ============================================================
[[language]]
name = "sql"
language-servers = ["sql-language-server"]

[language-server.sql-language-server]
command = "sql-language-server"
args = ["up", "--method", "stdio"]

# ============================================================
# Tailwind CSS
# ============================================================
[language-server.tailwindcss-language-server]
command = "tailwindcss-language-server"
args = ["--stdio"]
